<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON</title>
</head>
<body>
    

    <div id="nombre"></div>
    <script>
        //acceder a los datos json por medio de XMLHttpRequest
        let datosJson; //creamos variable de datos 
        let xhr = new XMLHttpRequest() //No pide parámetros
        xhr.open("GET","persona.json",true) //Parámetros: método, url(ruta), y asincrono(booleano)
        xhr.responseType = "json" //el tipo de respuesta que esperamos
        xhr.onload = function(){
            //evento que se desencadena cuando xhr responde adecuadamente
            if(xhr.status === 200){
                //comprobar el estado de la solicitud exitosa
                datosJson = xhr.response; //almacenamos los datos
                let elementoTexto = document.getElementById("nombre");
                elementoTexto.textContent = datosJson.nombre;
            } else {
                //manejar el error
            }
        }
        xhr.send(); //siempre ejecutar


    </script>
</body>
</html>
