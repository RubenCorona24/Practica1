<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3</title>
</head>
<body>
    <div id="contenedor"></div>
    
    <script>
        //accedemos a los datos con fetch
        fetch("https://jsonplaceholder.typicode.com/posts")
        .then(response => response.json())
        .then(data => {
            alert("Datos extraídos con éxito")
            let elementoContenedor = document.getElementById("contenedor")
            for (let i=0;i<=5;i++){
                let post = data[i]
                let elementoParrafo = document.createElement("p")
                elementoParrafo.textContent = "Título: "+post.title+" - Contenido: "+post.body
                elementoContenedor.appendChild(elementoParrafo)
            }
        })
        .catch(error => {
            alert(error)
        })
    </script>
</body>
</html>
