<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de propinas</title>
    <link rel="stylesheet" href="estilosCalculadora.css">
</head>
<body>
    <h1>Calculadora de propinas</h1>
    <h2>Ingresa la información para calcular propina</h2>
    <br><br>
    <p>Total de cuenta</p>
    <input type="number" id="totalCuenta" value="0">
    <br><br>
    <p>¿Qué porcentaje de propina desea proporcionar?</p>
    <input type="number" id="porcentajePropina" value="0">
    <br><br><br>
    <button onclick="calcularPropina()">Calcular Propina</button>
    <br><br>
    <p>PROPINA CALCULADA</p>

    <p id="propina" class="resultado">$00.00</p>
    <br><br><br>
    <p>Total a Pagar</p>
    <p id="totalPagar" class="resultado">$00.00</p>
    <br><br><br>
    <button onclick="reiniciar()">Reiniciar Datos</button>
    <script>
        let totalCuenta = document.getElementById("totalCuenta")
        let porcentajePropina = document.getElementById("porcentajePropina")
        let elementoPropina = document.getElementById("propina")
        let elementoTotalPagar = document.getElementById("totalPagar")
        function calcularPropina(){
            let cuenta = parseFloat(totalCuenta.value) 
            let porcentaje =  parseFloat(porcentajePropina.value)
            let totalPropina = cuenta * (porcentaje / 100) 
            let pagoTotal = totalPropina + cuenta
            elementoPropina.textContent = "$"+totalPropina.toFixed(2)
            elementoTotalPagar.textContent = "$"+pagoTotal.toFixed(2)
        }
        function reiniciar(){
            totalCuenta.value = ""
            porcentajePropina.value = ""
            elementoPropina.textContent = "$00.00"
        }
    </script>
</body>
</html>
