<!DOCTYPE html>
<head>
    <title>Temporizador Javascript</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body onload="comenzarReloj()"> <!--Llama función comenzar reloj-->
    <input type="number" id="numeroElegido">
    <button onclick="comenzarTiempo()">Alarma</button>
    <h1 id="textoAlarma" >00:00:00</h1>
    <audio id="audioAlarma" >
       <source src="alarma.mp3" type="audio/mpeg">
       Sonido no habilitado
    </audio>
    <script>
        let elementoSegundos = document.getElementById("numeroElegido")
        let elementoAlarma = document.getElementById("textoAlarma")
        let elementoSonidoAlarma = document.getElementById("audioAlarma")
        function comenzarTiempo(){
            setTimeout(tiempoCumplido,1000*elementoSegundos.value)
            
        }
        function tiempoCumplido(){
            
            elementoAlarma.style.color = 'green'
            elementoSonidoAlarma.play();
        }
        function comenzarReloj(){
            setInterval(tictac,1000)
        }
        function tictac(){
            let tiempoActual = new Date();
            let hora = tiempoActual.getYe();
            let minutos = tiempoActual.getMinutes();
            let segundos = String(tiempoActual.getSeconds()).padStart(2,"0");

            let textoHora = hora+":"+minutos+":"+segundos
            elementoAlarma.textContent = textoHora
        }
    </script>
</body>
</html>
