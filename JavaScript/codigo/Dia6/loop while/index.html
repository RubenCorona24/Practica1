<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Do While</title>
</head>
<body>
    
    <script>
        let nombre = "Ruben"
        while (nombre != "Fede"){
            nombre = prompt("Dime tu nombre")
        }
        document.write("<h1>Bienvenido Ruben</h1>")
        //en este caso el codigo dentro de llaves no se ejecutó ya que
        //la condicion no se cumplió, directamente imprimió ne consola
    </script>
</body>
</html>
