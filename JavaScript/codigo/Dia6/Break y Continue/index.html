<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break y Continue</title>
</head>
<body>
    <script>
        //función de iteración con break
        function usoBreak(){
            let array1 = [1,3,7,24,96,11,10,63,12]
            for (let num of array1){
                if (num < 50){
                    document.write(num + "<br>");

                }else{
                    break; //rompe con el código
                }
            }
            document.write("Esto es todo")
        }
        //otro ejemplo con break
        let miArray = ['A', 'A', 'B', 'A', 'B', 'B', 'A'];

        function testLoop() {
            for(let letra of miArray) {
                if (letra != "B"){
                    console.log(letra);
                }else{
                    break;
                }
            }
        }
        //función de iteración con continues
        function usoContinue(){
            let array1 = [1,3,7,24,96,11,10,63,12];
            for (let num of array1){
                if (num < 50){
                    document.write(num + "<br>");

                }else{
                    continue; //omite y sigue con el código
                }
            }
            document.write("Esto es todo")
        }
        //otro ejemplo con continue
        function testLoop() {
            let miArray = [9, 5, 6, 2, 7];
            for (let numero of miArray) {
                if (numero > 5){
                    console.log(numero);
                } else{
                    continue;
                }
            }
        }
        
    </script>
</body>
</html>
