<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random</title>
</head>
<body>
    <button onclick="numeroAleatorio()">Número aleatorio</button>
    <h2>Número aleatorio: <span id="textoAleatorio">----</span></h2>
    <p>Establecer número mínimo: </p>
    <input type="number" id="numeroMin">
    <p>Establecer número máximo</p>
    <input type="number" id="numeroMax">
    <script>
        let elementoAleatorio = document.getElementById("textoAleatorio")
        let elementoMinimo = document.getElemfntById("numeroMin")
        let elementoMaximo = document.getElementById("numeroMax")
        function crearAleatorio(minimo,maximo){
            maximo = maximo + 1
            let resultado = Math.floor(Math.random() * (maximo-minimo) + minimo)
            return resultado
        }
        function numeroAleatorio(){
            let numMinimo = parseInt(elementoMinimo.value)
            let numMaximo = parseInt(elementoMaximo.value)
            let numeroAleatorio = crearAleatorio(numMinimo,numMaximo)
            elementoAleatorio.textContent = numeroAleatorio
        }
    </script>
</body>
</html>
