<!DOCTYPE html>
<head>
    <title>DIV Y SPAN</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h2>Operaciones matemáticas</h2>
    <p>Las matemáticas son indispensables</p>
    <p>Nos permiten hacer cálculos</p>
    <p>Estas son algunas de las más básicas</p>
    <div class="calculo">
        <p>5+8 = <span class="resultado">13</span></p>
        <p>10-6 = <span class="resultado">4</span></p>
        <p>3x10 = <span class="resultado">30</span></p>
    </div>
    <p>Existe una variedad de operaciones</p>
    <p>Más adelante veremos operaciones más complejas</p>
</body>
</html>
