<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subclases</title>
</head>
<body>
    
    <script>
        //Para declarar subclases tenemos que poner "extends" después de la clase principals
        class Deportista{
            constructor(nombre,apellido){
                this.nombre = nombre;
                this.apellido = apellido
            }
        } //creamos clase deportista

        Deportista.prototype.saludar = function(){
            console.log("Hola, mi nombre es "+this.nombre+"!")
        }
        //creamos subclase futbolista
        class Futbolista extends Deportista{
            constructor(nombre,apellido,goles){
                super(nombre,apellido) //metodo super 
                //solo definimos el nuevo atributo "goles"
                this.goles = goles
            }
        }
    </script>
</body>
</html>
